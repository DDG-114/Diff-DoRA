base_model: models/Qwen2.5-1.5B-Instruct
dataset: st_evcdp
horizon: 6
history_len: 12
neighbor_k: 7
lora:
  r: 32
  alpha: 32
  dropout: 0.05
  use_dora: true          # DoRA enabled
train:
  epochs: 2
  batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-4
  max_length: 2560
  fp16: true
routing:
  method: hard            # hard label routing
  n_experts: 2
retrieval:
  top_k: 2
diff_dora:
  input_dim: 3            # [diff_occ, diff_temp, diff_price]
  hidden_dim: 32
  scale: 0.5
output_dir: outputs/moe_diff_dora_h6
